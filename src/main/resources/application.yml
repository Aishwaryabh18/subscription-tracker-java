server:
  port: ${PORT:5000}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt-secret: ${JWT_SECRET}
  jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:604800}
